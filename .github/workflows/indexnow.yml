name: IndexNow — Submit to Search Engines

on:
  push:
    branches:
      - main

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs to Bing, Yandex, and all IndexNow engines
        run: |
          PAYLOAD='{"host":"tech-events-msi.onrender.com","key":"a1f7a6416f8bdea032a24b8274930e11","keyLocation":"https://tech-events-msi.onrender.com/a1f7a6416f8bdea032a24b8274930e11.txt","urlList":["https://tech-events-msi.onrender.com/","https://tech-events-msi.onrender.com/register.php","https://tech-events-msi.onrender.com/login.php","https://tech-events-msi.onrender.com/viewTeam.php","https://tech-events-msi.onrender.com/privacy.php","https://tech-events-msi.onrender.com/terms.php"]}'

          echo "Submitting to Bing..."
          curl -sf -o /dev/null -w "Bing: %{http_code}\n" -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" -d "$PAYLOAD"

          echo "Submitting to Yandex..."
          curl -sf -o /dev/null -w "Yandex: %{http_code}\n" -X POST "https://yandex.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" -d "$PAYLOAD"

          echo "Submitting to IndexNow.org (all engines)..."
          curl -sf -o /dev/null -w "IndexNow: %{http_code}\n" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" -d "$PAYLOAD"
