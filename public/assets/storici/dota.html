<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Teams — EEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

    <nav>
        <a href="/" class="nav-logo">EEM</a>
        <div class="links">
            <a href="/">Home</a>
            <a href="storico.html">Storico</a>
            <a href="/login.php" class="btn-nav">Accedi</a>
        </div>
    </nav>

    <div class="page-header">
        <div>
            <p class="section-label">Dota 2 — via OpenDota</p>
            <h1>Dota 2 Teams</h1>
            <p>Lista completa dei team professionali con statistiche</p>
        </div>
        <a href="storico.html" class="back-link">← Torna allo Storico</a>
    </div>

    <div class="table-wrapper">
        <table id="tabella">
            <thead>
                <tr>
                    <th>Nome Team</th>
                    <th>Rating</th>
                    <th>Vittorie</th>
                    <th>Sconfitte</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div class="loading" id="loading"></div>
    </div>

    <div class="load-area">
        <button id="start">Carica Team Dota 2</button>
    </div>

    <footer>
        <span class="footer-logo">EEM</span>
        <p>© 2026 — Tech Dragons Events</p>
    </footer>

    <script>
        const tabella = document.getElementById('tabella').querySelector('tbody');
        const btn = document.getElementById('start');
        const loading = document.getElementById('loading');

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = 'Caricamento...';
            loading.style.display = 'block';
            try {
                const obj = await API();
                obj.forEach(team => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${team.name ?? 'N/A'}</td>
                        <td>${team.rating ?? 'N/A'}</td>
                        <td>${team.wins ?? 0}</td>
                        <td>${team.losses ?? 0}</td>
                    `;
                    tabella.appendChild(tr);
                });
                btn.textContent = `${obj.length} team caricati`;
            } catch (e) {
                btn.textContent = 'Errore nel caricamento';
                btn.disabled = false;
                console.error(e);
            } finally {
                loading.style.display = 'none';
            }
        });

        async function API() {
            const res = await fetch('https://api.opendota.com/api/teams');
            return res.json();
        }
    </script>

</body>
</html>
