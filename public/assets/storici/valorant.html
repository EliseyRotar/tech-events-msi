<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Events — Tech Dragons Events Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="/assets/js/main.js" defer></script>
</head>
<body>

<div id="page-overlay" aria-hidden="true"><span class="overlay-logo">TD</span></div>
<div id="cursor-dot"  aria-hidden="true"></div>
<div id="cursor-ring" aria-hidden="true"></div>

<nav class="glass-nav scrolled" id="navbar" role="navigation">
    <div class="nav-container">
        <a href="/" class="nav-logo">Tech<span>Dragons</span></a>
        <div class="links">
            <a href="/">Overview</a>
            <a href="storico.html">Archive</a>
            <a href="/login.php" class="btn-secondary" style="padding:8px 18px;">Sign In</a>
            <a href="/register.php" class="btn-primary" style="padding:8px 18px;">Register</a>
        </div>
    </div>
</nav>

<!-- Header -->
<div class="game-page-header">
    <div style="display:flex;align-items:center;gap:20px;">
        <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:rgba(255,70,85,0.08);border:1px solid rgba(255,70,85,0.2);flex-shrink:0;">
            <svg width="36" height="36" viewBox="0 0 44 44" fill="none">
                <path d="M22 8L36 18V26L22 36L8 26V18L22 8Z" fill="#FF4655" opacity="0.2"/>
                <path d="M10 14L22 32L34 14H28L22 26L16 14H10Z" fill="#FF4655"/>
            </svg>
        </div>
        <div>
            <span class="section-label">Valorant · VLR.gg</span>
            <h1>Valorant Events</h1>
            <p>Completed VCT circuit events with prize pools and regions</p>
        </div>
    </div>
    <a href="storico.html" class="back-link">← Back to Archive</a>
</div>

<!-- Controls -->
<div class="game-controls">
    <input class="game-search" type="text" id="search" placeholder="Search event or region…" autocomplete="off">
    <span class="game-count" id="count"></span>
    <button class="game-load-btn" id="refresh-btn">↻ Refresh</button>
</div>

<!-- Table -->
<div class="game-table-wrap">
    <table class="game-table" id="table">
        <thead>
            <tr>
                <th data-col="title">Event</th>
                <th data-col="dates">Dates</th>
                <th data-col="prize">Prize Pool</th>
                <th data-col="region">Region</th>
                <th data-col="status">Status</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<div class="load-more-wrap" id="load-more-wrap" style="display:none;">
    <button class="game-load-btn" id="load-more-btn">Load more</button>
</div>

<footer style="border-top:1px solid var(--border);padding:60px 24px;text-align:center;">
    <span class="footer-logo">Tech<span style="color:var(--accent-blue)">Dragons</span></span>
    <p style="color:var(--text-secondary);margin-top:12px;font-size:14px;">© 2026 Tech Dragons Events. All rights reserved.</p>
</footer>

<script>
(function () {
    const tbody      = document.getElementById('tbody');
    const countEl    = document.getElementById('count');
    const searchEl   = document.getElementById('search');
    const refreshBtn = document.getElementById('refresh-btn');
    const loadMoreWrap = document.getElementById('load-more-wrap');
    const loadMoreBtn  = document.getElementById('load-more-btn');

    const PAGE_SIZE = 25;
    let allRows  = [];
    let filtered = [];
    let shown    = 0;
    let sortCol  = null;
    let sortAsc  = true;

    function showSkeleton(n = 8) {
        tbody.innerHTML = '';
        for (let i = 0; i < n; i++) {
            const tr = document.createElement('tr');
            tr.className = 'game-skeleton';
            tr.innerHTML = `
                <td><div class="skeleton-pulse" style="height:14px;border-radius:4px;width:${55+Math.random()*35}%"></div></td>
                <td><div class="skeleton-pulse" style="height:14px;border-radius:4px;width:80px"></div></td>
                <td><div class="skeleton-pulse" style="height:14px;border-radius:4px;width:70px"></div></td>
                <td><div class="skeleton-pulse" style="height:14px;border-radius:4px;width:60px"></div></td>
            `;
            tbody.appendChild(tr);
        }
    }

    function renderRows() {
        const slice = filtered.slice(shown, shown + PAGE_SIZE);
        slice.forEach(row => {
            const statusStyle = row.status === 'completed'
                ? 'background:rgba(0,232,120,0.1);color:var(--success);padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--font-mono);letter-spacing:0.5px;text-transform:uppercase'
                : 'background:rgba(0,212,255,0.1);color:var(--accent-blue);padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--font-mono);letter-spacing:0.5px;text-transform:uppercase';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight:600;">${esc(row.title)}</td>
                <td style="color:var(--text-secondary);font-size:13px;">${esc(row.dates)}</td>
                <td style="font-family:var(--font-mono);color:var(--accent-blue);">${esc(row.prize)}</td>
                <td><span style="background:rgba(0,212,255,0.1);color:var(--accent-blue);padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--font-mono);letter-spacing:0.5px;text-transform:uppercase">${esc(row.region)}</span></td>
                <td><span style="${statusStyle}">${esc(row.status)}</span></td>
            `;
            tbody.appendChild(tr);
        });
        shown += slice.length;
        countEl.textContent = filtered.length + ' event' + (filtered.length !== 1 ? 's' : '');
        loadMoreWrap.style.display = shown < filtered.length ? '' : 'none';
    }

    function applyFilter() {
        const q = searchEl.value.toLowerCase().trim();
        filtered = allRows.filter(r =>
            !q || r.title.toLowerCase().includes(q) || r.region.toLowerCase().includes(q)
        );
        tbody.innerHTML = '';
        shown = 0;
        renderRows();
    }

    function esc(s) {
        if (s == null || s === '') return '<span style="color:var(--text-secondary)">—</span>';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function load() {
        refreshBtn.disabled = true;
        refreshBtn.textContent = 'Loading…';
        showSkeleton();
        countEl.textContent = '';
        try {
            // Use server-side PHP proxy to avoid CORS restrictions
            const res  = await fetch('/api/valorant.php');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const json = await res.json();
            if (!json.success) throw new Error('API error');

            allRows = (json.data ?? []).map(e => ({
                title:  e.title  ?? '',
                prize:  e.prize  ?? '',
                region: e.region ?? '',
                dates:  e.dates  ?? '',
                status: e.status ?? 'completed',
            }));
            filtered = [...allRows];
            tbody.innerHTML = '';
            shown = 0;
            renderRows();
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-secondary);padding:40px;">
                Failed to load Valorant events. Please try again.
                <button class="game-load-btn" onclick="load()" style="margin-left:12px;display:inline-block;padding:8px 16px;">Retry</button>
            </td></tr>`;
            countEl.textContent = '';
        } finally {
            refreshBtn.disabled = false;
            refreshBtn.textContent = '↻ Refresh';
        }
    }

    // Sort columns
    document.querySelectorAll('.game-table th[data-col]').forEach(th => {
        th.addEventListener('click', () => {
            const col = th.dataset.col;
            if (sortCol === col) sortAsc = !sortAsc;
            else { sortCol = col; sortAsc = true; }

            document.querySelectorAll('.game-table th').forEach(t => t.className = '');
            th.className = sortAsc ? 'sort-asc' : 'sort-desc';

            filtered.sort((a, b) => {
                const av = a[col] ?? '';
                const bv = b[col] ?? '';
                return sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
            });
            tbody.innerHTML = '';
            shown = 0;
            renderRows();
        });
    });

    searchEl.addEventListener('input', applyFilter);
    refreshBtn.addEventListener('click', load);
    loadMoreBtn.addEventListener('click', renderRows);

    load();
})();
</script>
</body>
</html>
